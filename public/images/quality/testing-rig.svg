<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e3a3e"/>
      <stop offset="100%" stop-color="#1e2a2e"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a1418" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#0a1418" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="80" y="60" width="640" height="390" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="120" y="300" width="560" height="15" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect x="280" y="180" width="240" height="120" rx="3" fill="rgba(200,161,76,0.06)" stroke="rgba(200,161,76,0.12)" stroke-width="1"/>
    <line x1="160" y1="120" x2="400" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <line x1="400" y1="180" x2="640" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <circle cx="400" cy="330" r="15" fill="rgba(200,161,76,0.08)"/>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="155" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">TENSILE TESTING</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">Tensile Testing Laboratory</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">ASTM / EN / GB standards · Computer-controlled</text>
</svg>