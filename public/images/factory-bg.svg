<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#152A4A"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#050D18" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#050D18" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="0" y="450" width="1600" height="450" fill="rgba(255,255,255,0.015)"/>
    <line x1="0" y1="360" x2="1600" y2="360" stroke="rgba(200,161,76,0.08)" stroke-width="1"/>
    <line x1="0" y1="630" x2="1600" y2="630" stroke="rgba(200,161,76,0.06)" stroke-width="1"/>
    <circle cx="240" cy="270" r="225" fill="none" stroke="rgba(200,161,76,0.04)" stroke-width="1"/>
    <circle cx="1360" cy="450" r="270" fill="none" stroke="rgba(200,161,76,0.03)" stroke-width="1"/>
  <rect width="1600" height="900" fill="url(#over)"/>
  
  <text x="800" y="864" text-anchor="middle" fill="#fff" font-size="22" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">Henggu Materials</text>
  <text x="800" y="886" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="13" font-family="system-ui,sans-serif">80,000 m² Modern Manufacturing Base | 8 Production Lines | CNAS Accredited</text>
</svg>