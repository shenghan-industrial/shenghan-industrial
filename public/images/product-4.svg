<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2e3e"/>
      <stop offset="100%" stop-color="#0e1e2e"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#060e18" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#060e18" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="200" y="60" width="400" height="360" rx="8" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    <rect x="240" y="90" width="320" height="300" rx="4" fill="rgba(255,255,255,0.04)"/>
    <line x1="240" y1="210" x2="560" y2="210" stroke="rgba(200,161,76,0.1)" stroke-width="1"/>
    <line x1="240" y1="270" x2="560" y2="270" stroke="rgba(200,161,76,0.08)" stroke-width="1"/>
    <text x="400" y="420" text-anchor="middle" fill="rgba(200,161,76,0.35)" font-size="32" font-family="system-ui,sans-serif" font-weight="900">IG</text>
  <rect width="800" height="600" fill="url(#over)"/>
  
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">IG-8000 Insulating Glass Sealant</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">Two-component · IG unit secondary seal</text>
</svg>