<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3545"/>
      <stop offset="100%" stop-color="#0d2838"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#061020" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#061020" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="160" y="60" width="480" height="390" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(200,161,76,0.1)" stroke-width="1"/>
    <rect x="240" y="30" width="320" height="20" rx="4" fill="rgba(200,161,76,0.1)"/>
    <circle cx="400" cy="240" r="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <text x="400" y="264" text-anchor="middle" fill="rgba(200,161,76,0.4)" font-size="40" font-family="system-ui,sans-serif" font-weight="900">SG</text>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="119" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">BEST SELLER</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">SG-9000 Structural Sealant</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">Two-component · Super high-rise curtain walls</text>
</svg>