<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a4a3a"/>
      <stop offset="100%" stop-color="#0d2d22"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#061a10" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#061a10" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#over)"/>

  <!-- Bottle shape -->
  <rect x="340" y="200" width="120" height="280" rx="16" fill="#2a7d5a" opacity="0.9"/>
  <rect x="350" y="160" width="100" height="60" rx="8" fill="#3a9d6a" opacity="0.9"/>
  <rect x="375" y="140" width="50" height="30" rx="6" fill="#4ab87a" opacity="0.9"/>

  <!-- Spray trigger -->
  <rect x="420" y="170" width="60" height="12" rx="4" fill="#ddd"/>
  <rect x="475" y="168" width="20" height="16" rx="3" fill="#ccc"/>

  <!-- Label -->
  <rect x="348" y="320" width="104" height="80" rx="6" fill="white" opacity="0.9"/>
  <line x1="360" y1="340" x2="440" y2="340" stroke="#1a4a3a" stroke-width="3" opacity="0.6"/>
  <line x1="360" y1="355" x2="420" y2="355" stroke="#2a7d5a" stroke-width="2" opacity="0.4"/>
  <line x1="360" y1="368" x2="430" y2="368" stroke="#2a7d5a" stroke-width="2" opacity="0.4"/>
  <line x1="360" y1="381" x2="410" y2="381" stroke="#2a7d5a" stroke-width="2" opacity="0.4"/>

  <!-- Cleaning bubbles -->
  <circle cx="280" cy="260" r="18" fill="white" opacity="0.15"/>
  <circle cx="520" cy="240" r="14" fill="white" opacity="0.12"/>
  <circle cx="260" cy="420" r="12" fill="white" opacity="0.1"/>
  <circle cx="540" cy="440" r="22" fill="white" opacity="0.1"/>
  <circle cx="300" cy="500" r="16" fill="white" opacity="0.08"/>
  <circle cx="500" cy="380" r="10" fill="white" opacity="0.12"/>

  <!-- Sparkles -->
  <text x="240" y="200" font-size="28" fill="white" opacity="0.3">✦</text>
  <text x="530" y="310" font-size="20" fill="white" opacity="0.25">✦</text>
  <text x="250" y="460" font-size="16" fill="white" opacity="0.2">✦</text>
</svg>
