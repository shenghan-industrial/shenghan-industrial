<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2e3e"/>
      <stop offset="100%" stop-color="#1e1e2e"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0e0e18" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#0e0e18" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <circle cx="320" cy="210" r="45" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <circle cx="320" cy="210" r="25" fill="rgba(200,161,76,0.06)"/>
    <rect x="80" y="90" width="160" height="72" rx="4" fill="rgba(255,255,255,0.05)"/>
    <rect x="480" y="240" width="240" height="180" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="520" y1="300" x2="680" y2="300" stroke="rgba(200,161,76,0.12)" stroke-width="1"/>
    <line x1="520" y1="330" x2="640" y2="330" stroke="rgba(200,161,76,0.1)" stroke-width="1"/>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="110" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">R&D CENTER</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">R&D Innovation Center</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">20+ patents · Formula development · Application testing</text>
