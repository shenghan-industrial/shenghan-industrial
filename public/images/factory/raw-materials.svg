<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d3028"/>
      <stop offset="100%" stop-color="#2e2520"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#181210" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#181210" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="40" y="180" width="144" height="240" rx="4" fill="rgba(255,255,255,0.06)"/>
    <rect x="200" y="150" width="160" height="270" rx="4" fill="rgba(255,255,255,0.08)"/>
    <rect x="376" y="180" width="144" height="240" rx="4" fill="rgba(255,255,255,0.05)"/>
    <rect x="536" y="120" width="176" height="300" rx="4" fill="rgba(255,255,255,0.07)"/>
    <circle cx="120" cy="90" r="8" fill="rgba(200,161,76,0.08)"/>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="137" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">RAW MATERIALS</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">Raw Material Management</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">Premium silicone polymers · Certified suppliers only</text>
</svg>