<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3a4e"/>
      <stop offset="100%" stop-color="#1e2e3e"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a1820" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#0a1820" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <ellipse cx="200" cy="270" rx="50" ry="65" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <ellipse cx="200" cy="180" rx="50" ry="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <ellipse cx="400" cy="270" rx="42" ry="55" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <ellipse cx="400" cy="198" rx="42" ry="18" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <ellipse cx="576" cy="270" rx="48" ry="62" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="146" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">BULK PACKAGING</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">Bulk Packaging Line</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">200L drums · 1000L IBC totes · Nitrogen-sealed</text>
</svg>