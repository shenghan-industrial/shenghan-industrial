<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3e2a"/>
      <stop offset="100%" stop-color="#1e2e1e"/>
    </linearGradient>
    <linearGradient id="over" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0a180a" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#0a180a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="n"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bg)" filter="url(#noise)" opacity="0.3"/>
  <rect x="64" y="120" width="20" height="300" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="160" y="90" width="20" height="330" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="280" y="120" width="20" height="300" rx="3" fill="rgba(255,255,255,0.07)"/>
    <rect x="400" y="60" width="20" height="360" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="520" y="108" width="20" height="312" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="640" y="132" width="20" height="288" rx="3" fill="rgba(255,255,255,0.06)"/>
    <line x1="0" y1="270" x2="800" y2="270" stroke="rgba(200,161,76,0.1)" stroke-width="3"/>
  <rect width="800" height="600" fill="url(#over)"/>
  <rect x="16" y="16" width="146" height="28" rx="6" fill="rgba(0,0,0,0.45)"/>
  <text x="26" y="35" fill="#fff" font-size="11" font-family="system-ui,sans-serif" font-weight="600">CARTRIDGE LINE</text>
  <text x="400" y="564" text-anchor="middle" fill="#fff" font-size="17" font-family="system-ui,sans-serif" font-weight="700" opacity="0.95">Cartridge Filling Line</text>
  <text x="400" y="586" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11" font-family="system-ui,sans-serif">300ml & 500ml · High-speed · Automatic assembly</text>
</svg>